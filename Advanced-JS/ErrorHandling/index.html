<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }
        
        button {
            width: 90%;
            padding: 10px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        #msg {
            margin-top: 10px;
            font-weight: bold;
        }
        
        #list{
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class ="container">
    <h2>Student Registration</h2>

    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="email" placeholder="Email">

    <button onclick="registerStudent()">Register</button>

    <p id="msg"></p>

    <ul id="list"></ul>

    <script src="./script.js"></script>
    
    </div>
    
</body>
</html>
